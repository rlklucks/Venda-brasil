<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oportunidade de Hoje</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .wrapper { max-width: 500px; margin: auto; }
        .offer { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; margin: 20px 0; }
        
        /* Estilo do Card de Perfil */
        .profile-card { background: #1a1a1a; padding: 15px; border-radius: 15px; display: flex; align-items: center; margin: 20px 0; border: 1px solid #333; text-align: left; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; border: 2px solid #ffc107; }
        .status { color: #25d366; font-size: 0.8rem; font-weight: bold; }
        
        h1 { font-size: 1.8rem; line-height: 1.3; }
        .highlight { color: #ffc107; }
        .timer { font-size: 1.2rem; font-weight: bold; color: #ffc107; margin-bottom: 10px; }
        .price-new { font-size: 2.8rem; font-weight: bold; color: #25d366; margin: 5px 0; }
        .cta { background: #25d366; color: #fff; padding: 20px; border-radius: 50px; text-decoration: none; display: block; font-weight: bold; font-size: 1.3rem; margin-top: 20px; box-shadow: 0 0 15px #25d366; }
        .main-img { width: 100%; max-width: 300px; margin: 20px 0; border-radius: 10px; }
        
        #notification { position: fixed; bottom: 20px; left: 20px; background: #333; padding: 15px; border-radius: 8px; border-left: 5px solid #25d366; display: none; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Aprenda a vender na internet mesmo <span class="highlight">começando do zero.</span></h1>
        
        <div class="profile-card">
            <img src="image.png" alt="Kelvin Martins" class="profile-img">
            <div>
                <strong>Falar com Kelvin Martins</strong><br>
                <span class="status">● Status: ONLINE ✅</span>
            </div>
        </div>

        <img src="IMG_5543.jpeg" alt="Curso" class="main-img">

        <div class="offer">
            <div class="timer" id="timer-box">Promoção válida somente hoje!</div>
            <div class="price-new">✅ HOJE POR R$ 39,90</div>
            <a href="https://go.tribopay.com.br/i8eljnxthp" class="cta">🚀 QUERO COMEÇAR AGORA</a>
        </div>
        
        <p>Dúvidas? Chame no WhatsApp: <strong>(32) 98719-4791</strong></p>
    </div>

    <div id="notification"></div>

    <script>
        // Contador 30 min
        let time = 30 * 60;
        const timerBox = document.getElementById('timer-box');
        setInterval(() => {
            const m = Math.floor(time / 60);
            const s = time % 60;
            timerBox.innerHTML = `Acaba em: ${m}:${s < 10 ? '0' : ''}${s}`;
            if (time > 0) time--;
        }, 1000);
    </script>
</body>
</html>
