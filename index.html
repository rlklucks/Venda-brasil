<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja do Brasil</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; text-align: center; }
        .hero { background: #005533; color: white; padding: 40px 20px; }
        .bloco { background: white; max-width: 400px; margin: 20px auto; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .promo { background: #ffcc00; color: #005533; padding: 10px; font-weight: bold; border-radius: 5px; margin-bottom: 15px; }
        .btn-zap { background: #25d366; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        select { width: 100%; padding: 10px; margin: 5px 0 10px 0; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Blusa Brasil Premium</h1>
        <p>A camisa oficial da Equipe da Sorte</p>
    </div>

    <!-- Promoção 1 -->
    <div class="bloco">
        <div class="promo">PROMOÇÃO 1: 2 Camisas por R$ 119,90</div>
        <img src="IMG_5541.jpeg" width="100%" alt="Blusa">
        <label>Tamanho 1:</label><select id="t1"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <label>Tamanho 2:</label><select id="t2"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <button class="btn-zap" onclick="pedir(1)">PEDIR PROMOÇÃO 1</button>
    </div>

    <!-- Promoção 2 -->
    <div class="bloco">
        <div class="promo" style="background:#00bcd4; color:white;">PROMOÇÃO 2: 3 Femininas por R$ 119,90</div>
        <img src=IMG_5543.jpeg width="100%" alt="Blusa Feminina">
        <label>Tamanho 1:</label><select id="tf1"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <label>Tamanho 2:</label><select id="tf2"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <label>Tamanho 3:</label><select id="tf3"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <button class="btn-zap" onclick="pedir(2)">PEDIR PROMOÇÃO 2</button>
    </div>

    <script>
        function pedir(tipo) {
            let msg = (tipo == 1) ? `Quero a promoção 1 (2 camisas): ${document.getElementById('t1').value}, ${document.getElementById('t2').value}` : `Quero a promoção 2 (3 femininas): ${document.getElementById('tf1').value}, ${document.getElementById('tf2').value}, ${document.getElementById('tf3').value}`;
            window.open("https://wa.me/5532987194791?text=" + msg, "_blank");
        }
    </script>
</body>
