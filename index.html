<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja - Equipe da Sorte</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; text-align: center; }
        .hero { background: #005533; color: white; padding: 30px 10px; }
        .bloco { background: white; max-width: 400px; margin: 20px auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .promo { background: #ffcc00; color: #005533; padding: 10px; font-weight: bold; border-radius: 8px; margin-bottom: 10px; }
        .tabs { display: flex; gap: 5px; margin: 15px 0; }
        .tab-btn { flex: 1; padding: 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: #eee; font-size: 12px; transition: 0.3s; }
        .tab-btn.active { background: #005533; color: white; border-color: #005533; }
        .pagamento-area { display: none; margin-top: 10px; padding: 10px; border: 1px dashed #ccc; border-radius: 5px; }
        .btn-zap { background: #25d366; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; }
        input[type="text"], select { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="hero"><h1>Blusa Brasil Premium</h1></div>

    <!-- Promoção 1 -->
    <div class="bloco">
        <div class="promo">PROMOÇÃO 1: 2 Camisas por R$ 119,90</div>
        <img src="IMG_5541.jpeg" width="100%" alt="Blusa">
        <input type="text" id="cep1" placeholder="Digite seu CEP" onblur="processarCep(1)">
        <input type="text" id="end1" placeholder="Endereço">
        <p id="frete1" style="color:red; font-size:14px; font-weight:bold;"></p>

        <div class="tabs">
            <button class="tab-btn active" id="btn1-cartao" onclick="trocarTab(1, 'cartao')">Cartão</button>
            <button class="tab-btn" id="btn1-pix" onclick="trocarTab(1, 'pix')">Pix/Boleto</button>
        </div>
        <div id="cartao1" class="pagamento-area" style="display:block;">
            <select id="parc1" onchange="calcularTotal(1)">
                <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}x c/ juros</option>`);</script>
            </select>
        </div>
        <p id="total1" style="font-weight:bold; margin-top:10px;">Total c/ Frete: R$ 119,90</p>

        <label>Tamanho da camisa azul:</label><select id="t1"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <label>Tamanho da camisa amarela:</label><select id="t2"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <button class="btn-zap" onclick="pedir(1)">PEDIR PROMOÇÃO 1</button>
    </div>

    <!-- Promoção 2 -->
    <div class="bloco">
        <div class="promo" style="background:#00bcd4; color:white;">PROMOÇÃO 2: 3 Femininas por R$ 119,90</div>
        <img src="IMG_5543.jpeg" width="100%" alt="Blusa Feminina">
        <input type="text" id="cep2" placeholder="Digite seu CEP" onblur="processarCep(2)">
        <input type="text" id="end2" placeholder="Endereço">
        <p id="frete2" style="color:red; font-size:14px; font-weight:bold;"></p>

        <div class="tabs">
            <button class="tab-btn active" id="btn2-cartao" onclick="trocarTab(2, 'cartao')">Cartão</button>
            <button class="tab-btn" id="btn2-pix" onclick="trocarTab(2, 'pix')">Pix/Boleto</button>
        </div>
        <div id="cartao2" class="pagamento-area" style="display:block;">
            <select id="parc2" onchange="calcularTotal(2)">
                <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}x c/ juros</option>`);</script>
            </select>
        </div>
        <p id="total2" style="font-weight:bold; margin-top:10px;">Total c/ Frete: R$ 119,90</p>

        <label>Tamanho da camisa azul:</label><select id="tf1"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <label>Tamanho da amarela:</label><select id="tf2"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <label>Tamanho da verde:</label><select id="tf3"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <button class="btn-zap" onclick="pedir(2)">PEDIR PROMOÇÃO 2</button>
    </div>

    <script>
        let vF = { 1: 0, 2: 0 };
        async function processarCep(id) {
            let cep = document.getElementById('cep'+id).value.replace(/\D/g, '');
            if(cep.length != 8) return;
            let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            let data = await res.json();
            if(!data.erro) {
                document.getElementById('end'+id).value = `${data.logradouro}, ${data.bairro} - ${data.localidade}`;
                vF[id] = (data.uf === 'MG') ? 15.00 : 29.90;
                document.getElementById('frete'+id).innerText = `Frete para ${data.uf}: R$ ${vF[id].toFixed(2)}`;
                calcularTotal(id);
            }
        }
        function calcularTotal(id) {
            let n = parseInt(document.getElementById('parc'+id).value);
            let tot = 119.90 + vF[id];
            let val = (n > 1) ? tot * 1.10 : tot;
            document.getElementById('total'+id).innerText = `Total c/ Frete: R$ ${val.toFixed(2)} (${n}x de R$ ${(val/n).toFixed(2)})`;
        }
        function trocarTab(id, tipo) {
            document.getElementById('cartao'+id).style.display = (tipo === 'cartao') ? 'block' : 'none';
            document.getElementById('btn'+id+'-cartao').classList.toggle('active', tipo === 'cartao');
            document.getElementById('btn'+id+'-pix').classList.toggle('active', tipo === 'pix');
        }
        function pedir(t) {
            let end = document.getElementById('end'+t).value;
            let msg = (t == 1) ? `Promoção 1: Azul ${document.getElementById('t1').value}, Amarela ${document.getElementById('t2').value}. End: ${end}` : `Promoção 2: Azul ${document.getElementById('tf1').value}, Amarela ${document.getElementById('tf2').value}, Verde ${document.getElementById('tf3').value}. End: ${end}`;
            window.open("https://wa.me/5532987194791?text=" + encodeURIComponent(msg), "_blank");
        }
    </script>
</body>
</html>
