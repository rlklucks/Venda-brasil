<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja - Equipe da Sorte</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; text-align: center; }
        .hero { background: #005533; color: white; padding: 30px 10px; }
        .bloco { background: white; max-width: 400px; margin: 20px auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .promo { background: #ffcc00; color: #005533; padding: 10px; font-weight: bold; border-radius: 8px; margin-bottom: 10px; }
        .tabs { display: flex; gap: 5px; margin: 15px 0; }
        .tab-btn { flex: 1; padding: 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: #eee; font-size: 12px; transition: 0.3s; }
        .tab-btn.active { background: #005533; color: white; border-color: #005533; }
        .pagamento-area { display: none; margin-top: 10px; padding: 10px; border: 1px dashed #ccc; border-radius: 5px; }
        .btn-zap { background: #25d366; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; }
        input[type="text"], select { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        .notificacao { background: #333; color: white; padding: 10px; position: fixed; bottom: 10px; width: 90%; margin: 0 5%; border-radius: 5px; font-size: 12px; display: none; }
    </style>
</head>
<body>
    <div class="hero"><h1>Blusa Brasil Premium</h1></div>

    <!-- Promoção 1 -->
    <div class="bloco">
        <div class="promo">PROMOÇÃO 1: 2 Camisas por R$ 119,90</div>
        <img src="IMG_5541.jpeg" width="100%" alt="Blusa">
        
        <div class="tabs">
            <button class="tab-btn active" id="btn1-cartao" onclick="trocarTab(1, 'cartao')">Cartão</button>
            <button class="tab-btn" id="btn1-pix" onclick="trocarTab(1, 'pix')">Pix</button>
            <button class="tab-btn" id="btn1-boleto" onclick="trocarTab(1, 'boleto')">Boleto</button>
        </div>

        <div id="cartao1" class="pagamento-area" style="display:block;">
            <select id="parc1" onchange="calc(1)">
                <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}x ${i>1?'c/ 10% juros':''}</option>`);</script>
            </select>
            <p id="res1" style="font-weight:bold;">Parcela: R$ 119,90</p>
        </div>
        <div id="outro1" class="pagamento-area">
            <p>Pagamento via <b>Pix ou Boleto</b>.<br>Finalize para falar comigo no WhatsApp.</p>
        </div>

        <label>Tamanho 1:</label><select id="t1"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <label>Tamanho 2:</label><select id="t2"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        
        <input type="text" id="cep1" placeholder="CEP (00000-000)" onblur="buscarCep(1)">
        <input type="text" id="end1" placeholder="Endereço">
        
        <input type="text" id="cupom1" placeholder="Cupom de 10% (PRIMEIRA10)">
        <button class="btn-zap" onclick="pedir(1)">PEDIR PROMOÇÃO 1</button>
    </div>

    <!-- Promoção 2 -->
    <div class="bloco">
        <div class="promo" style="background:#00bcd4; color:white;">PROMOÇÃO 2: 3 Femininas por R$ 119,90</div>
        <img src="IMG_5543.jpeg" width="100%" alt="Blusa Feminina">
        
        <div class="tabs">
            <button class="tab-btn active" id="btn2-cartao" onclick="trocarTab(2, 'cartao')">Cartão</button>
            <button class="tab-btn" id="btn2-pix" onclick="trocarTab(2, 'pix')">Pix</button>
            <button class="tab-btn" id="btn2-boleto" onclick="trocarTab(2, 'boleto')">Boleto</button>
        </div>

        <div id="cartao2" class="pagamento-area" style="display:block;">
            <select id="parc2" onchange="calc(2)">
                <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}x ${i>1?'c/ 10% juros':''}</option>`);</script>
            </select>
            <p id="res2" style="font-weight:bold;">Parcela: R$ 119,90</p>
        </div>
        <div id="outro2" class="pagamento-area">
            <p>Pagamento via <b>Pix ou Boleto</b>.<br>Finalize para falar comigo no WhatsApp.</p>
        </div>

        <label>Tamanho 1:</label><select id="tf1"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <label>Tamanho 2:</label><select id="tf2"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        <label>Tamanho 3:</label><select id="tf3"><option>P</option><option>M</option><option>G</option><option>GG</option></select>
        
        <input type="text" id="cep2" placeholder="CEP (00000-000)" onblur="buscarCep(2)">
        <input type="text" id="end2" placeholder="Endereço">
        
        <input type="text" id="cupom2" placeholder="Cupom de 10% (PRIMEIRA10)">
        <button class="btn-zap" onclick="pedir(2)">PEDIR PROMOÇÃO 2</button>
    </div>

    <script>
        async function buscarCep(id) {
            let cep = document.getElementById('cep'+id).value.replace(/\D/g, '');
            if(cep.length != 8) return;
            let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            let data = await res.json();
            if(!data.erro) {
                document.getElementById('end'+id).value = `${data.logradouro}, ${data.bairro} - ${data.localidade}`;
            }
        }

        function trocarTab(id, tipo) {
            document.getElementById('cartao'+id).style.display = (tipo === 'cartao') ? 'block' : 'none';
            document.getElementById('outro'+id).style.display = (tipo !== 'cartao') ? 'block' : 'none';
            ['cartao', 'pix', 'boleto'].forEach(t => document.getElementById('btn'+id+'-'+t).classList.remove('active'));
            document.getElementById('btn'+id+'-'+tipo).classList.add('active');
        }

        function calc(id) {
            let n = parseInt(document.getElementById('parc'+id).value);
            let total = (n > 1) ? 119.90 * 1.10 : 119.90;
            document.getElementById('res'+id).innerHTML = `Parcela: <b>R$ ${(total/n).toFixed(2).replace('.', ',')}</b>`;
        }

        function pedir(tipo) {
            let end = document.getElementById('end'+tipo).value;
            if(!end) { alert("Preencha o CEP para carregar o endereço!"); return; }
            
            let n = document.getElementById('parc'+tipo).value;
            let total = (n > 1) ? 119.90 * 1.10 : 119.90;
            let valParcela = total / n;
            let metodo = (document.getElementById('cartao'+tipo).style.display === 'block') ? `Cartão (${n}x de R$ ${valParcela.toFixed(2)})` : 'Pix ou Boleto';
            
            let msg = (tipo == 1) ? 
                `Promoção 1: ${document.getElementById('t1').value}, ${document.getElementById('t2').value}. %0AEndereço: ${end}. %0APagamento: ${metodo}` : 
                `Promoção 2: ${document.getElementById('tf1').value}, ${document.getElementById('tf2').value}, ${document.getElementById('tf3').value}. %0AEndereço: ${end}. %0APagamento: ${metodo}`;
            
            window.open("https://wa.me/5532987194791?text=" + msg, "_blank");
        }
    </script>
</body>
</html>
