<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja - Equipe da Sorte</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 10px; }
        .bloco { background: white; max-width: 400px; margin: 15px auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .promo { background: #ffcc00; color: #005533; padding: 10px; font-weight: bold; border-radius: 8px; margin-bottom: 10px; }
        input, select { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-zap { background: #25d366; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="bloco">
        <div class="promo">FINALIZAR PEDIDO</div>
        
        <label>CEP:</label>
        <input type="text" id="cep" placeholder="00000-000" onblur="buscarCep()">
        
        <label>Endereço:</label>
        <input type="text" id="rua" placeholder="Rua / Avenida">
        <input type="text" id="bairro" placeholder="Bairro">
        <input type="text" id="cidade" placeholder="Cidade">

        <label>Parcelamento:</label>
        <select id="nParcelas" onchange="calcular()">
            <option value="1">1x (R$ 119,90)</option>
            <script>
                for(let i=2; i<=24; i++) document.write(`<option value="${i}">${i}x com 10% juros</option>`);
            </script>
        </select>
        <p id="resultado">Valor da parcela: R$ 119,90</p>

        <button class="btn-zap" onclick="pedir()">ENVIAR PEDIDO VIA WHATSAPP</button>
    </div>

    <script>
        // Buscar CEP automático
        async function buscarCep() {
            let cep = document.getElementById('cep').value.replace(/\D/g, '');
            if(cep.length != 8) return;
            let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            let data = await res.json();
            if(!data.erro) {
                document.getElementById('rua').value = data.logradouro;
                document.getElementById('bairro').value = data.bairro;
                document.getElementById('cidade').value = data.localidade;
            }
        }

        // Calcular parcelas
        function calcular() {
            let n = document.getElementById('nParcelas').value;
            let total = 119.90;
            if (n > 1) total = total * 1.10;
            let val = total / n;
            document.getElementById('resultado').innerHTML = `Valor da parcela: <b>R$ ${val.toFixed(2).replace('.', ',')}</b>`;
        }

        // Enviar pedido
        function pedir() {
            let msg = `Olá! Quero finalizar meu pedido:%0AEndereço: ${document.getElementById('rua').value}, ${document.getElementById('bairro').value} - ${document.getElementById('cidade').value}%0AParcelado em: ${document.getElementById('nParcelas').value}x`;
            window.open("https://wa.me/5532987194791?text=" + msg, "_blank");
        }
    </script>
</body>
</html>
